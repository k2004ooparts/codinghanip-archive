<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코딩한입 아카이브</title>
<!-- ===== Google Analytics 4 (유입경로·방문자 추적) ===== -->
<script>
  // ▼▼▼ 여기에 GA4 측정 ID를 붙여넣으세요 (예: 'G-ABCD1234') ▼▼▼
  //   발급: analytics.google.com → 관리(Admin) → 데이터 스트림 → 웹 → 측정 ID
  window.GA_MEASUREMENT_ID = 'G-EE6MY8ST0J';
  // ▲▲▲ 위 한 줄만 바꾸면 추적이 켜집니다 ▲▲▲
  (function () {
    var id = window.GA_MEASUREMENT_ID;
    if (!id || /X{4,}/.test(id)) return; // placeholder면 비활성
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    window.gtag = function () { dataLayer.push(arguments); };
    gtag('js', new Date());
    gtag('config', id); // 유입경로(referrer)·UTM·지역·기기 자동 수집
  })();
</script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181b25;
    --surface-hover: #1f2330;
    --border: #2a2f3f;
    --text: #e8eaf0;
    --text-dim: #9aa0b0;
    --accent: #6c8cff;
    --accent-hover: #8aa4ff;
    --danger: #ff6b6b;
    --radius: 14px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f8;
      --surface: #ffffff;
      --surface-hover: #f0f2f8;
      --border: #e2e5ee;
      --text: #1b1e28;
      --text-dim: #6b7280;
      --accent: #4f6ef7;
      --accent-hover: #3d5ce5;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .container { max-width: 880px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 36px; }
  header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
  header p { color: var(--text-dim); margin-top: 8px; font-size: 0.95rem; }

  /* 추가 폼 */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .add-form .full { grid-column: 1 / -1; }
  .add-form input, .add-form textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color .15s;
  }
  .add-form textarea { resize: vertical; min-height: 60px; }
  .add-form input:focus, .add-form textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-actions { grid-column: 1 / -1; display: flex; gap: 10px; justify-content: flex-end; }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    transition: background .15s, opacity .15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 11px 22px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    padding: 11px 16px;
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); }

  /* 툴바 */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .toolbar input[type="search"] {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.92rem;
    font-family: inherit;
  }
  .toolbar input[type="search"]:focus { outline: none; border-color: var(--accent); }
  .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 0.92rem;
    font-family: inherit;
    cursor: pointer;
  }
  .toolbar select:focus { outline: none; border-color: var(--accent); }
  .count { color: var(--text-dim); font-size: 0.88rem; white-space: nowrap; }

  /* 카테고리 칩 */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
  }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* 링크 카드 */
  .works { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background .15s, transform .1s;
  }
  .card:hover { background: var(--surface-hover); }
  .card .favicon {
    width: 38px; height: 38px;
    border-radius: 9px;
    background: var(--bg);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card .favicon img { width: 22px; height: 22px; }
  .card .info { flex: 1; min-width: 0; }
  .card .title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card a.title {
    color: var(--text);
    font-weight: 700;
    font-size: 1.02rem;
    text-decoration: none;
  }
  .card a.title:hover { color: var(--accent); text-decoration: underline; }
  .card .tag {
    font-size: 0.72rem;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent);
    padding: 2px 9px;
    border-radius: 999px;
    font-weight: 600;
  }
  .card .desc {
    color: var(--text-dim);
    font-size: 0.86rem;
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .url {
    color: var(--text-dim);
    font-size: 0.76rem;
    margin-top: 3px;
    opacity: 0.7;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: 9px;
    font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.delete:hover { color: var(--danger); border-color: var(--danger); }
  .open-btn {
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent);
    padding: 8px 14px;
    border-radius: 9px;
    font-size: 0.85rem;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
  }
  .open-btn:hover { background: var(--accent); color: #fff; }

  /* 드래그 정렬 */
  .card .drag-handle {
    cursor: grab;
    color: var(--text-dim);
    font-size: 1.05rem;
    flex-shrink: 0;
    padding: 6px 2px;
    user-select: none;
    -webkit-user-select: none;
    opacity: 0.5;
  }
  .card .drag-handle:hover { opacity: 1; }
  .card .drag-handle:active { cursor: grabbing; }
  .card.dragging { opacity: 0.45; border-style: dashed; }

  /* 빈 상태 */
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty .big { font-size: 2.4rem; margin-bottom: 12px; }

  /* 푸터 */
  .footer-tools {
    margin-top: 36px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .footer-tools button, .footer-tools label {
    font-size: 0.82rem;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    font-family: inherit;
  }
  .footer-tools button:hover, .footer-tools label:hover { background: var(--surface); }

  /* 판매 상품 (전자책·강의) 섹션 */
  .store { margin-top: 52px; padding-top: 36px; border-top: 1px solid var(--border); }
  .store-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .store-head h2 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.4px; }
  .store-sub { color: var(--text-dim); font-size: 0.9rem; margin: 8px 0 22px; line-height: 1.5; }
  .product-form { margin-bottom: 24px; }
  .product-form select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
  }
  .product-form select:focus { outline: none; border-color: var(--accent); }
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform .12s, border-color .15s;
  }
  .product-card:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
  }
  .product-thumb {
    width: 100%;
    height: 116px;
    border-radius: 10px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    overflow: hidden;
  }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-type {
    align-self: flex-start;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .product-type.ebook { background: color-mix(in srgb, #f59e0b 18%, transparent); color: #d97706; }
  .product-type.course { background: color-mix(in srgb, #8b5cf6 22%, transparent); color: #7c3aed; }
  @media (prefers-color-scheme: dark) {
    .product-type.ebook { color: #fbbf24; }
    .product-type.course { color: #a78bfa; }
  }
  .product-name { font-weight: 700; font-size: 1.02rem; line-height: 1.35; }
  .product-desc {
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.45;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-price { font-size: 1.15rem; font-weight: 800; }
  .product-price .free { color: var(--accent); }
  .buy-btn {
    background: var(--accent);
    color: #fff;
    text-align: center;
    padding: 11px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.92rem;
    display: block;
  }
  .buy-btn:hover { background: var(--accent-hover); }
  .product-edit-row { display: flex; gap: 6px; }
  .product-edit-row .icon-btn { flex: 1; }

  /* 관리자 모드 */
  .admin-bar { margin-top: 30px; display: flex; justify-content: center; }
  .admin-bar button {
    font-size: 0.8rem;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  .admin-bar button:hover { background: var(--surface); }
  body.is-admin .admin-bar button { color: var(--accent); border-color: var(--accent); }
  .admin-banner {
    display: none;
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 18px;
  }
  body.is-admin .admin-banner { display: block; }

  /* 프롬프트 버튼 */
  .prompt-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 9px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .prompt-btn:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }
  .prompt-btn.has-prompt { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }

  /* 프롬프트 모달 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }
  .modal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 { font-size: 1.05rem; font-weight: 700; line-height: 1.3; word-break: break-all; }
  .modal-head .sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 3px; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 2px 8px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--bg); color: var(--text); }
  .modal-body { padding: 18px 20px; overflow-y: auto; }
  .modal-body textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-size: 0.92rem;
    line-height: 1.6;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .modal-body textarea:focus { outline: none; border-color: var(--accent); }
  .modal-body textarea[readonly] {
    background: color-mix(in srgb, var(--bg) 65%, var(--surface));
    cursor: default;
    resize: none;
  }
  .modal-body textarea[readonly]:focus { border-color: var(--border); }
  .modal-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
  .modal-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: flex-end;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .modal-hint { margin-right: auto; font-size: 0.8rem; color: var(--text-dim); }

  @media (max-width: 600px) {
    .add-form { grid-template-columns: 1fr; }
    .card { flex-wrap: wrap; }
    .store-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🗂️ 코딩한입 아카이브</h1>
    <p>지금까지 만든 작업물을 링크로 정리하는 공간</p>
  </header>

  <div class="admin-banner">🔧 관리자 모드 — 추가·수정·삭제가 가능합니다. (변경은 이 브라우저에만 저장돼요)</div>

  <form class="add-form" id="addForm" style="display:none">
    <input type="text" id="inputTitle" placeholder="제목 (예: 포트폴리오 사이트)" required>
    <input type="text" id="inputCategory" placeholder="카테고리 (예: 웹, 앱, 디자인 — 선택)">
    <input type="url" id="inputUrl" class="full" placeholder="링크 URL (https://...)" required>
    <textarea id="inputDesc" class="full" placeholder="간단한 설명 (선택)"></textarea>
    <div class="form-actions">
      <button type="button" class="btn-ghost" id="cancelEdit" style="display:none">취소</button>
      <button type="submit" class="btn-primary" id="submitBtn">+ 추가하기</button>
    </div>
  </form>

  <div class="toolbar">
    <input type="search" id="searchInput" placeholder="🔍 제목, 설명, 카테고리 검색">
    <select id="sortSelect" title="정렬 방식">
      <option value="manual">직접 정렬 (드래그)</option>
      <option value="latest">최신순</option>
      <option value="oldest">오래된순</option>
      <option value="name">이름순</option>
    </select>
    <span class="count" id="countLabel"></span>
  </div>

  <div class="chips" id="chips"></div>

  <div class="works" id="works"></div>

  <section class="store" id="store">
    <div class="store-head">
      <h2>🛒 전자책 · 강의</h2>
      <button type="button" class="btn-ghost" id="toggleProductForm" style="display:none">+ 새 상품 등록</button>
    </div>
    <p class="store-sub">제작물을 전자책·강의로 만들어 판매해요. 구매 버튼은 인프런·크몽·Gumroad 등 판매 페이지로 연결됩니다.</p>

    <form class="add-form product-form" id="productForm" style="display:none">
      <input type="text" id="pName" placeholder="상품명 (예: 7일 만에 끝내는 React)" required>
      <select id="pType">
        <option value="전자책">전자책</option>
        <option value="강의">강의</option>
      </select>
      <input type="text" id="pThumb" placeholder="썸네일 이모지 또는 이미지 URL (예: 📘)">
      <input type="number" id="pPrice" placeholder="가격 (원, 0=무료)" min="0">
      <input type="url" id="pBuyUrl" class="full" placeholder="구매/판매 페이지 URL (인프런·크몽·Gumroad 등)" required>
      <textarea id="pDesc" class="full" placeholder="상품 소개 (선택)"></textarea>
      <div class="form-actions">
        <button type="button" class="btn-ghost" id="pCancel">취소</button>
        <button type="submit" class="btn-primary" id="pSubmit">+ 상품 추가</button>
      </div>
    </form>

    <div class="store-grid" id="storeGrid"></div>
  </section>

  <div class="footer-tools" style="display:none">
    <button id="exportBtn">⬇ 백업 내보내기 (JSON)</button>
    <label for="importFile">⬆ 백업 가져오기</label>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>

  <div class="admin-bar">
    <button type="button" id="adminToggle">🔒 관리자</button>
  </div>
</div>

<div class="modal-overlay" id="promptModal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div>
        <h3 id="promptModalTitle">프롬프트</h3>
        <div class="sub" id="promptModalSub"></div>
      </div>
      <button type="button" class="modal-close" id="promptModalClose" aria-label="닫기">×</button>
    </div>
    <div class="modal-body">
      <textarea id="promptText" placeholder="이 작업물을 만들 때 사용한 프롬프트를 적어보세요."></textarea>
    </div>
    <div class="modal-actions">
      <span class="modal-hint" id="promptHint"></span>
      <button type="button" class="btn-ghost" id="promptCopy">📋 복사</button>
      <button type="button" class="btn-primary" id="promptSave">💾 저장</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'my-works-v1';
const SORT_KEY = 'my-works-sort';

// ===== 관리자 모드 =====
// ▼ 관리자 비밀번호 (소스에 노출되므로 '편집 UI 숨김'용일 뿐, 진짜 보안 아님)
const ADMIN_PASSCODE = '0203';
const ADMIN_FLAG = 'admin-mode';
function isAdmin() { return localStorage.getItem(ADMIN_FLAG) === '1'; }

// ===== 게시된 기본 제작물 (모든 방문자에게 보이는 목록) =====
// 여기 있는 데이터가 '공개 포트폴리오'입니다. 변경을 모두에게 반영하려면 이 배열을 수정해 커밋하세요.
const DEFAULT_WORKS = [
  { id: 'd-baemin-claude', title: '배민 클론 (Claude)', url: 'https://k2004ooparts.github.io/baemin-claude/', category: '웹 클론', description: '배달의민족 UI 클론 — Claude로 제작', createdAt: '2026-06-20' },
  { id: 'd-karrot-gpt', title: '당근마켓 클론 (GPT)', url: 'https://k2004ooparts.github.io/codinghanip-archive/karrot-clone-gpt/', category: '웹 클론', description: '지역 기반 중고거래 MVP — GPT로 제작', createdAt: '2026-06-29' },
  { id: 'd-karrot', title: '당근마켓 클론', url: 'https://k2004ooparts.github.io/karrot-clone/', category: '웹 클론', description: '당근마켓 UI 클론', createdAt: '2026-06-18' },
  { id: 'd-musinsa', title: '무신사 클론', url: 'https://k2004ooparts.github.io/musinsa-clone/', category: '웹 클론', description: '무신사 UI 클론', createdAt: '2026-06-16' },
  { id: 'd-baemin-gpt', title: '배민 클론 (GPT)', url: 'https://k2004ooparts.github.io/baemin-clone-gpt/', category: '웹 클론', description: '배달의민족 UI 클론 — GPT로 제작', createdAt: '2026-06-14' }
];

let works = [];
let editingId = null;
let activeCategory = '전체';
let searchQuery = '';
let sortMode = localStorage.getItem(SORT_KEY) || 'manual';

function load() {
  let parsed = null;
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { parsed = JSON.parse(raw); } catch {} }
  // 저장된 목록이 있으면 그걸, 없으면(또는 비었으면) 게시 기본값을 사용
  works = (Array.isArray(parsed) && parsed.length) ? parsed : DEFAULT_WORKS.map(w => ({ ...w }));
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(works));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function faviconUrl(url) {
  try {
    const host = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
  } catch { return ''; }
}

function categories() {
  const set = new Set(works.map(w => w.category).filter(Boolean));
  return ['전체', ...set];
}

function sorted(list) {
  if (sortMode === 'latest') return [...list].sort((a, b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  if (sortMode === 'oldest') return [...list].sort((a, b) => (a.createdAt||'').localeCompare(b.createdAt||''));
  if (sortMode === 'name') return [...list].sort((a, b) => a.title.localeCompare(b.title, 'ko'));
  return list; // manual: 저장된 순서 그대로
}

function filtered() {
  return works.filter(w => {
    if (activeCategory !== '전체' && w.category !== activeCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (w.title + ' ' + (w.description||'') + ' ' + (w.category||'') + ' ' + w.url)
        .toLowerCase().includes(q);
    }
    return true;
  });
}

function render() {
  // 카테고리 칩
  const chipsEl = document.getElementById('chips');
  const cats = categories();
  if (!cats.includes(activeCategory)) activeCategory = '전체';
  chipsEl.innerHTML = cats.map(c =>
    `<button type="button" class="chip ${c === activeCategory ? 'active' : ''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`
  ).join('');

  // 카드 목록
  const list = sorted(filtered());
  const worksEl = document.getElementById('works');
  if (works.length === 0) {
    worksEl.innerHTML = `<div class="empty"><div class="big">📭</div>아직 등록된 제작물이 없어요.${isAdmin() ? '<br>위 폼에서 첫 번째 링크를 추가해 보세요!' : ''}</div>`;
  } else if (list.length === 0) {
    worksEl.innerHTML = `<div class="empty"><div class="big">🔍</div>검색 결과가 없어요.</div>`;
  } else {
    worksEl.innerHTML = list.map(w => `
      <div class="card" data-id="${w.id}">
        ${isAdmin() && sortMode === 'manual' ? '<div class="drag-handle" title="드래그해서 순서 변경">⠿</div>' : ''}
        <div class="favicon"><img src="${faviconUrl(w.url)}" alt="" onerror="this.style.display='none'"></div>
        <div class="info">
          <div class="title-row">
            <a class="title" href="${escapeHtml(w.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(w.title)}</a>
            ${w.category ? `<span class="tag">${escapeHtml(w.category)}</span>` : ''}
          </div>
          ${w.description ? `<div class="desc">${escapeHtml(w.description)}</div>` : ''}
          <div class="url">${escapeHtml(w.url)}</div>
        </div>
        <div class="actions">
          <a class="open-btn" href="${escapeHtml(w.url)}" target="_blank" rel="noopener noreferrer">열기 ↗</a>
          <button type="button" class="prompt-btn ${w.prompt ? 'has-prompt' : ''}" title="프롬프트 보기">📝 프롬프트</button>
          ${isAdmin() ? `<button type="button" class="icon-btn edit" title="수정">✏️</button>
          <button type="button" class="icon-btn delete" title="삭제">🗑️</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  document.getElementById('countLabel').textContent =
    `${list.length}개 / 총 ${works.length}개`;
}

// 폼 제출 (추가 또는 수정)
document.getElementById('addForm').addEventListener('submit', e => {
  e.preventDefault();
  const title = document.getElementById('inputTitle').value.trim();
  let url = document.getElementById('inputUrl').value.trim();
  const category = document.getElementById('inputCategory').value.trim();
  const description = document.getElementById('inputDesc').value.trim();
  if (!title || !url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  if (editingId) {
    const w = works.find(w => w.id === editingId);
    if (w) Object.assign(w, { title, url, category, description });
    stopEditing();
  } else {
    works.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title, url, category, description,
      createdAt: new Date().toISOString()
    });
  }
  save();
  e.target.reset();
  render();
});

function startEditing(w) {
  editingId = w.id;
  document.getElementById('inputTitle').value = w.title;
  document.getElementById('inputUrl').value = w.url;
  document.getElementById('inputCategory').value = w.category || '';
  document.getElementById('inputDesc').value = w.description || '';
  document.getElementById('submitBtn').textContent = '✓ 수정 완료';
  document.getElementById('cancelEdit').style.display = '';
  document.getElementById('inputTitle').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function stopEditing() {
  editingId = null;
  document.getElementById('submitBtn').textContent = '+ 추가하기';
  document.getElementById('cancelEdit').style.display = 'none';
  document.getElementById('addForm').reset();
}
document.getElementById('cancelEdit').addEventListener('click', stopEditing);

// 카드 내 수정/삭제 버튼
document.getElementById('works').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const w = works.find(w => w.id === card.dataset.id);
  if (!w) return;
  if (e.target.closest('.prompt-btn')) { openPromptModal(w); return; }
  if (e.target.closest('.edit')) startEditing(w);
  if (e.target.closest('.delete')) {
    if (confirm(`"${w.title}" 항목을 삭제할까요?`)) {
      works = works.filter(x => x.id !== w.id);
      if (editingId === w.id) stopEditing();
      save();
      render();
    }
  }
});

// 드래그로 순서 변경 (핸들 ⠿ 에서만 시작)
const worksList = document.getElementById('works');
worksList.addEventListener('mousedown', e => {
  const handle = e.target.closest('.drag-handle');
  if (handle) handle.closest('.card').setAttribute('draggable', 'true');
});
document.addEventListener('mouseup', () => {
  worksList.querySelectorAll('.card[draggable]').forEach(c => c.removeAttribute('draggable'));
});
worksList.addEventListener('dragstart', e => {
  const card = e.target.closest('.card');
  if (!card || card.getAttribute('draggable') !== 'true') return;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', card.dataset.id);
  requestAnimationFrame(() => card.classList.add('dragging'));
});
worksList.addEventListener('dragover', e => {
  const dragging = worksList.querySelector('.card.dragging');
  if (!dragging) return;
  e.preventDefault();
  const target = e.target.closest('.card');
  if (!target || target === dragging) return;
  const rect = target.getBoundingClientRect();
  const after = e.clientY > rect.top + rect.height / 2;
  worksList.insertBefore(dragging, after ? target.nextElementSibling : target);
});
worksList.addEventListener('dragend', e => {
  const card = e.target.closest('.card');
  // 핸들로 시작한 드래그(.dragging)만 처리 — 링크 텍스트 등 기본 드래그는 무시
  if (!card || !card.classList.contains('dragging')) return;
  card.classList.remove('dragging');
  card.removeAttribute('draggable');
  // 화면의 카드 순서를 저장 데이터에 반영
  // (검색/필터 중이면 보이는 항목들의 자리만 서로 재배치)
  const domIds = [...worksList.querySelectorAll('.card')].map(c => c.dataset.id);
  const visible = new Set(domIds);
  const byId = Object.fromEntries(works.map(w => [w.id, w]));
  let i = 0;
  works = works.map(w => visible.has(w.id) ? byId[domIds[i++]] : w);
  save();
  render();
});

// 카테고리 칩
document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  activeCategory = chip.dataset.cat;
  render();
});

// 검색
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// 정렬
const sortSelect = document.getElementById('sortSelect');
sortSelect.value = sortMode;
sortSelect.addEventListener('change', e => {
  sortMode = e.target.value;
  localStorage.setItem(SORT_KEY, sortMode);
  render();
});

// ===== 판매 상품 (전자책·강의) =====
const PRODUCTS_KEY = 'my-products-v1';
let products = [];
let editingProductId = null;

function loadProducts() {
  try { products = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || []; }
  catch { products = []; }
}
function saveProducts() {
  localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
}
function formatPrice(p) {
  const n = Number(p) || 0;
  return n <= 0 ? '<span class="free">무료</span>' : n.toLocaleString('ko-KR') + '원';
}
function renderStore() {
  const grid = document.getElementById('storeGrid');
  if (products.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">🛒</div>아직 등록된 상품이 없어요.<br>'+ 새 상품 등록'으로 전자책·강의를 추가해 보세요.</div>`;
    return;
  }
  grid.innerHTML = products.map(p => {
    const isCourse = p.type === '강의';
    const thumb = p.thumb && /^https?:\/\//i.test(p.thumb)
      ? `<img src="${escapeHtml(p.thumb)}" alt="" onerror="this.replaceWith(document.createTextNode('${isCourse ? '🎬' : '📘'}'))">`
      : escapeHtml(p.thumb || (isCourse ? '🎬' : '📘'));
    return `
    <div class="product-card" data-id="${p.id}">
      <div class="product-thumb">${thumb}</div>
      <span class="product-type ${isCourse ? 'course' : 'ebook'}">${escapeHtml(p.type)}</span>
      <div class="product-name">${escapeHtml(p.name)}</div>
      <div class="product-desc">${escapeHtml(p.desc || '')}</div>
      <div class="product-price">${formatPrice(p.price)}</div>
      <a class="buy-btn" href="${escapeHtml(p.buyUrl)}" target="_blank" rel="noopener noreferrer">구매하기 →</a>
      ${isAdmin() ? `<div class="product-edit-row">
        <button type="button" class="icon-btn p-edit" title="수정">✏️</button>
        <button type="button" class="icon-btn delete p-delete" title="삭제">🗑️</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

const productForm = document.getElementById('productForm');
document.getElementById('toggleProductForm').addEventListener('click', () => {
  const open = productForm.style.display !== 'none';
  productForm.style.display = open ? 'none' : 'grid';
  if (!open) document.getElementById('pName').focus();
});
document.getElementById('pCancel').addEventListener('click', () => {
  stopEditingProduct();
  productForm.style.display = 'none';
});

productForm.addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('pName').value.trim();
  const type = document.getElementById('pType').value;
  const thumb = document.getElementById('pThumb').value.trim();
  const price = document.getElementById('pPrice').value.trim();
  let buyUrl = document.getElementById('pBuyUrl').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  if (!name || !buyUrl) return;
  if (!/^https?:\/\//i.test(buyUrl)) buyUrl = 'https://' + buyUrl;

  if (editingProductId) {
    const p = products.find(p => p.id === editingProductId);
    if (p) Object.assign(p, { name, type, thumb, price, buyUrl, desc });
    stopEditingProduct();
  } else {
    products.unshift({
      id: 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      name, type, thumb, price, buyUrl, desc
    });
  }
  saveProducts();
  productForm.reset();
  renderStore();
});

function startEditingProduct(p) {
  editingProductId = p.id;
  document.getElementById('pName').value = p.name;
  document.getElementById('pType').value = p.type;
  document.getElementById('pThumb').value = p.thumb || '';
  document.getElementById('pPrice').value = p.price || '';
  document.getElementById('pBuyUrl').value = p.buyUrl;
  document.getElementById('pDesc').value = p.desc || '';
  document.getElementById('pSubmit').textContent = '✓ 수정 완료';
  productForm.style.display = 'grid';
  document.getElementById('pName').focus();
  productForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function stopEditingProduct() {
  editingProductId = null;
  document.getElementById('pSubmit').textContent = '+ 상품 추가';
  productForm.reset();
}

document.getElementById('storeGrid').addEventListener('click', e => {
  const card = e.target.closest('.product-card');
  if (!card) return;
  const p = products.find(p => p.id === card.dataset.id);
  if (!p) return;
  if (e.target.closest('.p-edit')) startEditingProduct(p);
  if (e.target.closest('.p-delete')) {
    if (confirm(`"${p.name}" 상품을 삭제할까요?`)) {
      products = products.filter(x => x.id !== p.id);
      if (editingProductId === p.id) stopEditingProduct();
      saveProducts();
      renderStore();
    }
  }
});

// 백업 내보내기 / 가져오기 (제작물 + 상품 함께)
document.getElementById('exportBtn').addEventListener('click', () => {
  const payload = { works, products, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `codinghanip-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      // 구버전(배열=제작물만)과 신버전({works, products}) 모두 지원
      const inWorks = Array.isArray(data) ? data : (data.works || []);
      const inProducts = Array.isArray(data) ? [] : (data.products || []);

      const haveW = new Set(works.map(w => w.id));
      const addedW = inWorks.filter(w => w && w.id && w.title && w.url && !haveW.has(w.id));
      works = [...addedW, ...works];

      const haveP = new Set(products.map(p => p.id));
      const addedP = inProducts.filter(p => p && p.id && p.name && p.buyUrl && !haveP.has(p.id));
      products = [...addedP, ...products];

      save();
      saveProducts();
      render();
      renderStore();
      alert(`제작물 ${addedW.length}개, 상품 ${addedP.length}개를 가져왔어요.`);
    } catch {
      alert('올바른 백업 파일이 아니에요.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ===== 프롬프트 메모 모달 =====
let promptWorkId = null;
const promptModal = document.getElementById('promptModal');
const promptText = document.getElementById('promptText');

function openPromptModal(w) {
  promptWorkId = w.id;
  const admin = isAdmin();
  document.getElementById('promptModalTitle').textContent = '📝 ' + w.title;
  document.getElementById('promptModalSub').textContent =
    admin ? '프롬프트를 작성하고 저장하세요.' : '이 작업물에 사용한 프롬프트예요.';
  promptText.value = w.prompt || '';
  promptText.readOnly = !admin;
  promptText.placeholder = admin
    ? '이 작업물을 만들 때 사용한 프롬프트를 적어보세요.'
    : '등록된 프롬프트가 없어요.';
  document.getElementById('promptSave').style.display = admin ? '' : 'none';
  // 방문자에겐 복사가 유일한 동작이므로 메인 버튼으로 강조, 빈 프롬프트면 비활성
  const copyBtn = document.getElementById('promptCopy');
  copyBtn.className = admin ? 'btn-ghost' : 'btn-primary';
  copyBtn.disabled = !w.prompt;
  document.getElementById('promptHint').textContent =
    (!admin && !w.prompt) ? '아직 등록된 프롬프트가 없어요.' : '';
  promptModal.classList.add('open');
  if (admin) promptText.focus();
  track('view_prompt', { work_title: w.title });
}
function closePromptModal() {
  promptModal.classList.remove('open');
  promptWorkId = null;
}
document.getElementById('promptModalClose').addEventListener('click', closePromptModal);
promptModal.addEventListener('click', e => { if (e.target === promptModal) closePromptModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && promptModal.classList.contains('open')) closePromptModal();
});
document.getElementById('promptSave').addEventListener('click', () => {
  if (!promptWorkId) return;
  const w = works.find(x => x.id === promptWorkId);
  if (w) { w.prompt = promptText.value; save(); render(); }
  closePromptModal();
});
document.getElementById('promptCopy').addEventListener('click', async () => {
  const hint = document.getElementById('promptHint');
  try {
    await navigator.clipboard.writeText(promptText.value);
  } catch {
    promptText.select();
    try { document.execCommand('copy'); } catch {}
  }
  hint.textContent = '복사됐어요!';
  setTimeout(() => { hint.textContent = ''; }, 1500);
});

// ===== 클릭 전환 추적 (GA4) =====
// 측정 ID가 설정돼 있을 때만 전송되고, 아니면 조용히 무시됩니다.
function track(name, params) {
  if (typeof window.gtag === 'function') window.gtag('event', name, params || {});
}
// 이벤트 위임 — 카드가 다시 그려져도 계속 동작
document.addEventListener('click', e => {
  const buy = e.target.closest('.buy-btn');
  if (buy) {
    const card = buy.closest('.product-card');
    const p = products.find(x => x.id === (card && card.dataset.id));
    track('purchase_click', {
      product_name: p ? p.name : '',
      product_type: p ? p.type : '',
      price: p ? Number(p.price) || 0 : 0,
      link_url: buy.href
    });
    return;
  }
  const open = e.target.closest('#works .open-btn, #works a.title');
  if (open) {
    const card = open.closest('.card');
    const w = works.find(x => x.id === (card && card.dataset.id));
    track('open_work', { work_title: w ? w.title : open.textContent.trim(), link_url: open.href });
  }
});

// ===== 관리자 모드 UI 토글 =====
function applyAdminUI() {
  const on = isAdmin();
  document.body.classList.toggle('is-admin', on);
  document.getElementById('addForm').style.display = on ? 'grid' : 'none';
  document.getElementById('toggleProductForm').style.display = on ? '' : 'none';
  if (!on) document.getElementById('productForm').style.display = 'none';
  document.querySelector('.footer-tools').style.display = on ? 'flex' : 'none';
  document.getElementById('adminToggle').textContent = on ? '🔓 관리자 모드 ON — 끄기' : '🔒 관리자';
}
document.getElementById('adminToggle').addEventListener('click', () => {
  if (isAdmin()) {
    localStorage.removeItem(ADMIN_FLAG);
    stopEditing();
    stopEditingProduct();
  } else {
    const pass = prompt('관리자 비밀번호를 입력하세요');
    if (pass === null) return;
    if (pass !== ADMIN_PASSCODE) { alert('비밀번호가 올바르지 않아요.'); return; }
    localStorage.setItem(ADMIN_FLAG, '1');
  }
  applyAdminUI();
  render();
  renderStore();
});
// URL로 바로 진입: ...?admin=<비밀번호>
(function () {
  const u = new URLSearchParams(location.search).get('admin');
  if (u && u === ADMIN_PASSCODE) localStorage.setItem(ADMIN_FLAG, '1');
})();

load();
render();
loadProducts();
renderStore();
applyAdminUI();
</script>
</body>
</html>
